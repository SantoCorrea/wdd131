<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Submitted | WDD 131</title>
  <meta name="description" content="Confirmation page shown after a product review is submitted." />
  <meta name="author" content="Gabriel" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="styles/review.css" />
  <script src="scripts/form.js" defer></script>

<body>
  <header class="site-header">
    <h1>Product Review</h1>
    <p class="tagline">Thanks — your review has been logged</p>
  </header>

  <main>
    <section class="confirmation-card">
      <h2>Review received</h2>
      <dl id="review-summary"></dl>
      <p class="counter-line">
        Reviews submitted on this device: <strong id="review-count">0</strong>
      </p>
      <a class="back-link" href="form.html">&larr; Submit another review</a>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Gabriel</p>
    <p>Altamira, Pará, Brazil</p>
    <p>Last Modification: <span id="last-modified"></span></p>
  </footer>

</html>
